<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            padding: 30px 20px;
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00f260, #0575e6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 1.1em;
        }

        .controls {
            max-width: 700px;
            margin: 0 auto 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .btn-add {
            background: linear-gradient(90deg, #00f260, #0575e6);
            color: #fff;
        }

        .btn-sort {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-sort.active {
            background: rgba(0, 242, 96, 0.2);
            border-color: #00f260;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: #1e1b3a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
        }

        .modal h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        .modal input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1em;
            outline: none;
        }

        .modal input:focus {
            border-color: #00f260;
        }

        .modal input::placeholder { color: #666; }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons .btn { flex: 1; }

.btn-cancel {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        .btn-save {
            background: linear-gradient(90deg, #00f260, #0575e6);
            color: #fff;
        }

        .servers-list {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .server-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .server-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .server-card.online { border-left: 4px solid #4CAF50; }
        .server-card.offline { border-left: 4px solid #f44336; }

        .server-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .server-name { font-size: 1.5em; font-weight: bold; margin-bottom: 5px; }

        .server-ip {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .server-ip span {
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .server-ip span:hover { background: rgba(255,255,255,0.2); }

        .btn-delete {
            background: none;
            border: none;
            color: #666;
            font-size: 1.3em;
            cursor: pointer;
            padding: 5px;
        }

        .btn-delete:hover { color: #f44336; }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .info-label { color: #999; }
        .info-value { font-weight: bold; }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .status-online { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .status-offline { background: rgba(244, 67, 54, 0.2); color: #f44336; }

        .players-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
        }

        .players-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f260, #0575e6);
            border-radius: 4px;
            transition: width 0.5s;
        }

        .motd {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-size: 0.9em;
            color: #ccc;
            text-align: center;
        }

        .last-update {
            text-align: center;
            color: #555;
            margin-top: 30px;
            font-size: 0.85em;
        }

.empty-msg {
            text-align: center;
            color: #666;
            padding: 50px;
            font-size: 1.2em;
        }

        .server-count {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8em; }
            .controls { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <h1>⚡️ Server Monitor</h1>
    <p class="subtitle">Мониторинг серверов в реальном времени</p>

    <div class="controls">
        <button class="btn btn-add" onclick="openModal()">➕ Добавить сервер</button>
        <button class="btn btn-sort" id="sortName" onclick="setSort('name')">По имени</button>
        <button class="btn btn-sort" id="sortPlayers" onclick="setSort('players')">По игрокам</button>
        <button class="btn btn-sort" id="sortStatus" onclick="setSort('status')">По статусу</button>
    </div>

    <p class="server-count" id="serverCount"></p>
    <div id="servers" class="servers-list"></div>
    <p class="last-update" id="lastUpdate"></p>

    <!-- Модальное окно -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2>➕ Добавить сервер</h2>
            <input type="text" id="inputName" placeholder="Название (например: My Server)">
            <input type="text" id="inputIP" placeholder="IP адрес (например: play.server.com)">
            <input type="text" id="inputDesc" placeholder="Описание (необязательно)">
            <div class="modal-buttons">
                <button class="btn btn-cancel" onclick="closeModal()">Отмена</button>
                <button class="btn btn-save" onclick="addServer()">Добавить</button>
            </div>
        </div>
    </div>

    <script>
        let servers = JSON.parse(localStorage.getItem('mc_servers') || '[]');
        let currentSort = localStorage.getItem('mc_sort') || 'name';
        let serverData = {};

        function openModal() {
            document.getElementById('modal').classList.add('show');
            document.getElementById('inputName').focus();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            document.getElementById('inputName').value = '';
            document.getElementById('inputIP').value = '';
            document.getElementById('inputDesc').value = '';
        }

        function addServer() {
            const name = document.getElementById('inputName').value.trim();
            const ip = document.getElementById('inputIP').value.trim();
            const desc = document.getElementById('inputDesc').value.trim();

            if (!name || !ip) {
                alert('Введите название и IP!');
                return;
            }

            if (servers.find(s => s.ip === ip)) {
                alert('Сервер с таким IP уже добавлен!');
                return;
            }

            servers.push({ ip, name, description: desc });
            localStorage.setItem('mc_servers', JSON.stringify(servers));
            closeModal();
            loadServers();
        }

        function removeServer(ip) {

if (!confirm('Удалить этот сервер?')) return;
            servers = servers.filter(s => s.ip !== ip);
            localStorage.setItem('mc_servers', JSON.stringify(servers));
            loadServers();
        }

        function copyIP(ip) {
            navigator.clipboard.writeText(ip);
            alert('IP скопирован: ' + ip);
        }

        function setSort(type) {
            currentSort = type;
            localStorage.setItem('mc_sort', type);
            document.querySelectorAll('.btn-sort').forEach(b => b.classList.remove('active'));
            document.getElementById('sort' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('active');
            renderServers();
        }

        function sortServers(list) {
            return list.sort((a, b) => {
                const da = serverData[a.ip] || {};
                const db = serverData[b.ip] || {};
                if (currentSort === 'name') return a.name.localeCompare(b.name);
                if (currentSort === 'players') return (db.players || 0) - (da.players || 0);
                if (currentSort === 'status') return (db.online ? 1 : 0) - (da.online ? 1 : 0);
                return 0;
            });
        }

        function renderServers() {
            const container = document.getElementById('servers');
            const count = document.getElementById('serverCount');

            if (servers.length === 0) {
                container.innerHTML = '<div class="empty-msg">Нет серверов. Нажмите "Добавить сервер" ⬆️</div>';
                count.textContent = '';
                return;
            }

            const sorted = sortServers([...servers]);
            count.textContent = `Серверов: ${servers.length}`;

            container.innerHTML = sorted.map(server => {
                const data = serverData[server.ip];
                if (!data) {
                    return `
                        <div class="server-card offline">
                            <div class="server-header">
                                <div><div class="server-name">${server.name}</div>
                                <div class="server-ip">${server.ip}</div></div>
                                <button class="btn-delete" onclick="removeServer('${server.ip}')" title="Удалить">✕</button>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Статус</span>
                                <span class="status-badge status-offline">⏳ Загрузка...</span>
                            </div>
                        </div>`;
                }

                const online = data.online;
                const players = data.players || 0;
                const maxPlayers = data.maxPlayers || 0;
                const version = data.version || 'N/A';
                const motd = data.motd || '';
                const fillPercent = maxPlayers > 0 ? (players / maxPlayers) * 100 : 0;

                return `
                    <div class="server-card ${online ? 'online' : 'offline'}">
                        <div class="server-header">
                            <div>

<div class="server-name">${server.name}</div>
                                <div class="server-ip"><span onclick="copyIP('${server.ip}')" title="Скопировать IP">${server.ip} 📋</span></div>
                            </div>
                            <button class="btn-delete" onclick="removeServer('${server.ip}')" title="Удалить">✕</button>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Статус</span>
                            <span class="status-badge ${online ? 'status-online' : 'status-offline'}">
                                ${online ? '🟢 Онлайн' : '🔴 Оффлайн'}
                            </span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Игроки</span>
                            <span class="info-value">${players} / ${maxPlayers}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Версия</span>
                            <span class="info-value">${version}</span>
                        </div>
                        ${server.description ? `<div class="info-row"><span class="info-label">Описание</span><span class="info-value">${server.description}</span></div>` : ''}
                        <div class="players-bar"><div class="players-fill" style="width: ${fillPercent}%"></div></div>
                        ${motd ? `<div class="motd">${motd}</div>` : ''}
                    </div>`;
            }).join('');
        }

        async function fetchServer(server) {
            try {
                const response = await fetch(`https://api.mcsrvstat.us/2/${server.ip}`);
                const data = await response.json();
                serverData[server.ip] = {
                    online: data.online || false,
                    players: data.players ? data.players.online : 0,
                    maxPlayers: data.players ? data.players.max : 0,
                    version: data.version || 'N/A',
                    motd: data.motd ? data.motd.clean.join(' ') : ''
                };
            } catch (e) {
                serverData[server.ip] = { online: false, players: 0, maxPlayers: 0, version: 'N/A', motd: '' };
            }
        }

        async function loadServers() {
            renderServers();
            await Promise.all(servers.map(s => fetchServer(s)));
            renderServers();
            document.getElementById('lastUpdate').textContent =
                'Последнее обновление: ' + new Date().toLocaleTimeString('ru-RU');
        }

        // Подсветка активной сортировки
        document.getElementById('sort' + currentSort.charAt(0).toUpperCase() + currentSort.slice(1)).classList.add('active');

        // Закрытие модалки по Escape
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
        document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });

        loadServers();
        setInterval(loadServers, 30000);
    </script>

</body>
</html>
